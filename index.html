<!doctype html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Mystery Store</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#05060a;color:#fff;padding:18px;padding-bottom:120px}.page{display:none;animation:fade .2s}.active{display:block}@keyframes fade{from{opacity:.4}to{opacity:1}}.hero,.box,.menu{background:#0f1320;border:1px solid #20263a;border-radius:30px;padding:22px;margin-bottom:18px}.hero{background:linear-gradient(180deg,#0d1120,#090b12)}.hero h1{font-size:40px}.heroCard{margin-top:18px;border-radius:24px;padding:24px;background:radial-gradient(circle at right,#31355e,#090b12 60%)}.heroCard h2{font-size:52px;line-height:1.02;margin:10px 0}.heroBtn{margin-top:18px;border:1px solid #454a66;background:transparent;color:#fff;padding:14px 18px;border-radius:999px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}.card{background:#0d111b;border:1px solid #23283b;border-radius:20px;overflow:hidden}.thumb{width:100%;height:150px;object-fit:cover}.fallback{height:150px;background:#161a27;display:flex;align-items:center;justify-content:center;color:#9e7bff;font-size:40px}.body{padding:12px}.body h3{font-size:15px}.price{margin-top:8px;color:#d7d9e3;font-size:14px}.chips{display:flex;gap:10px;overflow:auto;margin:16px 0}.chip{padding:10px 14px;border-radius:999px;background:#161b28;border:1px solid #2a3045;white-space:nowrap}.chip.on{background:#8b5cf6}.search{width:100%;padding:14px;border-radius:16px;background:#11141d;border:1px solid #232738;color:#fff}.nav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:430px;background:#11141d;border:1px solid #232738;border-radius:26px;padding:14px;display:flex;justify-content:space-around}.nav button{background:none;border:none;color:#98a0b5}.nav .on{color:#9e7bff}.profile{display:flex;gap:18px;align-items:center}.avatar{width:84px;height:84px;border-radius:50%;background:#141925;display:flex;align-items:center;justify-content:center}.avatar svg,.icon svg{width:28px;height:28px;stroke:#9e7bff;fill:none;stroke-width:1.7}.bar{height:8px;background:#1d2232;border-radius:999px;margin-top:12px;overflow:hidden;width:92%}.fill{height:100%;background:#9e7bff}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}.quick-item{text-align:center;font-size:12px}.icon{width:56px;height:56px;background:#151925;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}.menu-item{display:flex;justify-content:space-between;padding:18px 0;border-bottom:1px solid #1d2231}.menu-item:last-child{border:none}.btn{width:100%;padding:14px;border:none;border-radius:16px;background:#8b5cf6;color:#fff;margin-top:14px}.input,textarea,select{width:100%;padding:14px;border-radius:16px;background:#11141d;border:1px solid #232738;color:#fff;margin-top:10px}.hidden{display:none}.subpage{padding-top:10px}.back{margin-bottom:16px;color:#9e7bff}</style></head><body><section id='home' class='page'><div class='hero'><h1>Mystery store</h1><div class='heroCard'><div style='color:#9aa1b6'>익숙한 일상 속,</div><h2>낯선 무언가</h2><div style='color:#9aa1b6;line-height:1.6'>당신의 호기심을 채워보세요.</div><button class='heroBtn'>탐험하러 가기 →</button></div></div><div style='display:flex;justify-content:space-between'><h2>New Arrivals</h2><span style='color:#9aa1b6'>전체보기</span></div><div class='chips' id='chips'></div><input class='search' id='search' placeholder='상품 검색'><div class='grid' id='products'></div></section><section id='detail' class='page'><div class='back' onclick='go("home")'>← 돌아가기</div><img id='dimg' class='thumb hidden' style='height:320px;border-radius:24px'><div id='df' class='fallback' style='height:320px;border-radius:24px'>✦</div><h1 id='dt' style='margin:20px 0 8px'></h1><div id='dp'></div><p id='dd' style='margin-top:18px;color:#98a0b5;line-height:1.7'></p><button class='btn' id='buy'>구매하기</button></section><section id='mypage' class='page'><div class='box'><div class='profile'><div class='avatar'><svg viewBox='0 0 24 24'><path d='M12 3v18'/><circle cx='12' cy='12' r='8'/></svg></div><div style='flex:1'><h1>Explorer</h1><div id='lv' style='margin-top:6px;color:#98a0b5'></div><div class='bar'><div id='fill' class='fill'></div></div><div id='xptext' style='margin-top:8px;color:#98a0b5;font-size:13px'></div></div></div></div><div class='box'><div class='quick'><div class='quick-item'><div class='icon'><svg viewBox='0 0 24 24'><rect x='5' y='5' width='14' height='14' rx='2'/></svg></div>주문</div><div class='quick-item' onclick='openRecent()'><div class='icon'><svg viewBox='0 0 24 24'><circle cx='12' cy='12' r='8'/><path d='M12 8v5l3 2'/></svg></div>최근본</div><div class='quick-item'><div class='icon'><svg viewBox='0 0 24 24'><path d='m12 21-7-7a4 4 0 0 1 6-6l1 1 1-1a4 4 0 0 1 6 6z'/></svg></div>찜</div><div class='quick-item'><div class='icon'><svg viewBox='0 0 24 24'><path d='M4 8h16v8H4z'/></svg></div>쿠폰</div></div></div><div class='menu'><div class='menu-item' onclick='openNotice()'><span>공지사항</span><span>›</span></div><div class='menu-item' onclick='support()'><span>고객센터</span><span>›</span></div><div class='menu-item' onclick='settings()'><span>설정</span><span>›</span></div><div class='menu-item' onclick='auth()'><span id='authText'></span><span>›</span></div></div><button class='btn' id='toggle'>편집 모드</button><div id='editor' class='hidden'><input class='input' id='name' placeholder='상품 이름'><select id='cat'><option>오브제</option><option>전자기기</option><option>문서</option></select><input class='input' id='price' placeholder='가격'><textarea id='desc'></textarea><input class='input' id='thumb' type='file'><textarea id='notice'></textarea><button class='btn' onclick='saveProduct()'>저장</button></div></section><section id='sub' class='page'><div class='back' onclick='go("mypage")'>← 돌아가기</div><div class='subpage'><h1 id='st'></h1><div id='sd' style='margin-top:18px;color:#98a0b5;line-height:1.7'></div></div></section><div class='nav'><button data-page='home'>홈</button><button data-page='mypage'>마이페이지</button></div><script>const defaults=[{id:1,name:'다차원 큐브',category:'오브제',price:59000,description:'빛을 비추면 내부 구조가 바뀐다.'}];let products=JSON.parse(localStorage.products||'null')||defaults;let recent=JSON.parse(localStorage.recent||'[]');let notices=JSON.parse(localStorage.notice||'[]');let editor=localStorage.editor==='true';let logged=localStorage.logged!=='false';let xp=+localStorage.xp||0;let level=Math.floor(xp/600)+1;let current=localStorage.page||'home';let currentCat='전체';const cats=['전체','오브제','전자기기','문서'];function persist(){localStorage.products=JSON.stringify(products);localStorage.recent=JSON.stringify(recent);localStorage.notice=JSON.stringify(notices);localStorage.editor=editor;localStorage.logged=logged;localStorage.xp=xp;localStorage.page=current}function go(id){current=id;persist();document.querySelectorAll('.page').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(v=>v.classList.remove('on'));document.querySelector(`[data-page="${id}"]`)?.classList.add('on')}document.querySelectorAll('.nav button').forEach(v=>v.onclick=()=>go(v.dataset.page));function render(){productsWrap.innerHTML='';let arr=[...products];let q=search.value.toLowerCase();if(currentCat!=='전체')arr=arr.filter(v=>v.category===currentCat);if(q)arr=arr.filter(v=>v.name.toLowerCase().includes(q));arr.forEach(p=>{let c=document.createElement('div');c.className='card';c.onclick=()=>detail(p.id);c.innerHTML=`${p.thumb?`<img class='thumb' src='${p.thumb}'>`:`<div class='fallback'>✦</div>`}<div class='body'><h3>${p.name}</h3><div class='price'>₩${Number(p.price).toLocaleString()}</div></div>`;productsWrap.appendChild(c)});lv.innerText='호기심 Lv.'+level;xptext.innerText=(xp%600)+' / 600';fill.style.width=((xp%600)/600*92)+'%';authText.innerText=logged?'로그아웃':'로그인';document.getElementById('editor').classList.toggle('hidden',!editor);persist()}const productsWrap=document.getElementById('products');cats.forEach(c=>{let e=document.createElement('div');e.className='chip'+(c==='전체'?' on':'');e.innerText=c;e.onclick=()=>{currentCat=c;document.querySelectorAll('.chip').forEach(v=>v.classList.remove('on'));e.classList.add('on');render()};chips.appendChild(e)});search.oninput=render;function detail(id){let p=products.find(v=>v.id===id);recent=[p,...recent.filter(v=>v.id!==id)].slice(0,10);dt.innerText=p.name;dp.innerText='₩'+Number(p.price).toLocaleString();dd.innerText=p.description;if(p.thumb){dimg.src=p.thumb;dimg.classList.remove('hidden');df.classList.add('hidden')}else{dimg.classList.add('hidden');df.classList.remove('hidden')}buy.onclick=()=>{xp+=Math.floor(p.price/1000);level=Math.floor(xp/600)+1;render();alert('구매 완료')};go('detail')}toggle.onclick=()=>{editor=!editor;render()};function saveProduct(){let fr=new FileReader();let file=thumb.files[0];if(file){fr.onload=e=>add(e.target.result);fr.readAsDataURL(file)}else add('');function add(img){products.unshift({id:Date.now(),name:name.value,category:cat.value,price:+price.value,description:desc.value,thumb:img});if(notice.value)notices.unshift(notice.value);render();go('home')}}function openNotice(){sub('공지사항',notices.length?notices.join('<br><br>'):'공지 없음')}function support(){sub('고객센터','자주 묻는 질문<br><br>Q. 배송 기간?<br>A. 평균 2~3일<br><br>1:1 문의<br>mystery@store.com')}function settings(){sub('설정','알림 설정<br><br>앱 사운드<br><br>화면 효과')}function auth(){logged=!logged;render();alert(logged?'로그인됨':'로그아웃됨')}function openRecent(){sub('최근 본 상품',recent.length?recent.map(v=>v.name).join('<br><br>'):'없음')}function sub(t,d){st.innerText=t;sd.innerHTML=d;go('sub')}go(current);render()</script></body></html>
