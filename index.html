<!doctype html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>Mystery Store</title><link rel='preconnect' href='https://fonts.googleapis.com'><link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap' rel='stylesheet'><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif;background:#05060a;color:#fff;padding:18px;padding-bottom:120px}.app{max-width:430px;margin:auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.top h1{font-size:32px}.hero{background:linear-gradient(180deg,#11131c,#090b11);border:1px solid #202436;border-radius:30px;padding:28px;margin-bottom:24px}.tag{display:inline-block;background:#151927;border:1px solid #2b3045;color:#b6b3d8;padding:8px 12px;border-radius:999px;font-size:12px;margin-bottom:16px}.hero h2{font-size:38px;line-height:1.05;margin-bottom:12px}.hero p{color:#98a0b3;line-height:1.6;margin-bottom:20px}.hero button{width:100%;padding:15px;border:none;border-radius:16px;background:linear-gradient(90deg,#8b5cf6,#6d4cff);color:#fff;font-weight:700}.section{display:flex;justify-content:space-between;margin-bottom:16px}.section span{color:#8b90a6}.products{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:#0e1118;border:1px solid #1f2435;border-radius:24px;overflow:hidden}.image{height:170px;background:linear-gradient(180deg,#171b28,#0d1017);display:flex;align-items:center;justify-content:center;font-size:46px;color:#9e7bff}.body{padding:16px}.body h3{font-size:18px;margin-bottom:8px}.body p{font-size:13px;color:#9aa1b6;line-height:1.5;min-height:40px}.price{margin-top:16px;font-weight:700}.editor-toggle{width:100%;margin-top:22px;padding:14px;border-radius:16px;background:#151927;border:1px solid #2b3045;color:#fff}.editor{display:none;background:#0e1118;border:1px solid #202436;border-radius:24px;padding:18px;margin-top:18px}.editor.active{display:block}.editor input,.editor textarea{width:100%;margin-top:10px;padding:14px;border-radius:14px;border:1px solid #272c3d;background:#080a11;color:#fff}.editor textarea{height:90px;resize:none}.editor button{width:100%;margin-top:12px;padding:14px;border:none;border-radius:14px;background:#8b5cf6;color:#fff;font-weight:700}.delete{width:100%;margin-top:12px;padding:12px;border:none;border-radius:12px;background:#1b1f2b;color:#ff7f7f}.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;width:calc(100% - 32px);max-width:430px;background:rgba(10,11,18,.92);border:1px solid #232738;border-radius:24px;padding:14px;display:flex;justify-content:space-around}.nav{display:flex;flex-direction:column;align-items:center;font-size:12px;color:#8b90a6;gap:6px}.active{color:#9e7bff}@media(max-width:480px){.products{grid-template-columns:1fr}}</style></head><body><div class='app'><div class='top'><h1>Mystery Store</h1><div>◌</div></div><div class='hero'><div class='tag'>익숙한 일상 속 낯선 무언가</div><h2>설명되지 않는<br>물건들</h2><p>현실적인데 이상하게 기억에 남는 물건들을 판매합니다.</p><button>탐험하러 가기</button></div><div class='section'><h2>New Arrivals</h2><span>전체보기</span></div><div class='products' id='products'></div><button class='editor-toggle' id='toggle'>편집자 모드</button><div class='editor' id='editor'><input id='name' placeholder='상품 이름'><input id='price' placeholder='가격'><textarea id='desc' placeholder='설명'></textarea><button id='add'>상품 추가</button></div></div><div class='bottom'><div class='nav active'>⌂<span>홈</span></div><div class='nav'>◫<span>카테고리</span></div><div class='nav'>⌕<span>검색</span></div><div class='nav'>♡<span>찜</span></div><div class='nav'>◉<span>마이</span></div></div><script>const defaults=[{id:1,emoji:'◈',name:'다차원 큐브',price:'₩59,000',description:'빛을 비추면 내부 구조가 바뀐다.'},{id:2,emoji:'◌',name:'기억 저장 장치',price:'₩89,000',description:'누군가의 오래된 기억이 남아있다.'},{id:3,emoji:'⌛',name:'시간의 파편',price:'₩67,000',description:'초침 소리가 거꾸로 들린다.'}];let products=[];try{products=JSON.parse(localStorage.getItem('mystery-products')||'null')||defaults}catch(e){products=defaults}products=products.map(v=>({id:v.id||Date.now(),emoji:v.emoji||'✦',name:v.name||'이름 없는 상품',price:v.price||'가격 미정',description:v.description||'설명되지 않는 상품'}));let editorMode=localStorage.getItem('mystery-editor')==='true';const wrap=document.getElementById('products');const editor=document.getElementById('editor');function save(){localStorage.setItem('mystery-products',JSON.stringify(products));localStorage.setItem('mystery-editor',editorMode)}function render(){wrap.innerHTML='';editor.className=editorMode?'editor active':'editor';products.forEach(item=>{const el=document.createElement('div');el.className='card';el.innerHTML=`<div class='image'>${item.emoji}</div><div class='body'><h3>${item.name}</h3><p>${item.description}</p><div class='price'>${item.price}</div>${editorMode?`<button class='delete' onclick='removeProduct(${item.id})'>삭제</button>`:''}</div>`;wrap.appendChild(el)});save()}function removeProduct(id){products=products.filter(v=>v.id!==id);render()}window.removeProduct=removeProduct;document.getElementById('toggle').onclick=()=>{editorMode=!editorMode;render()};document.getElementById('add').onclick=()=>{const name=document.getElementById('name').value.trim();if(!name)return;products.unshift({id:Date.now(),emoji:'✦',name,price:document.getElementById('price').value||'가격 미정',description:document.getElementById('desc').value||'설명되지 않는 상품'});document.getElementById('name').value='';document.getElementById('price').value='';document.getElementById('desc').value='';render()};render()</script></body></html>
