<!doctype html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Mystery Store</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#05060a;color:#fff;padding:18px;padding-bottom:120px}.page{display:none}.active{display:block}.box,.hero,.card,.menu,.sub{background:#10131c;border:1px solid #22283a;border-radius:28px;padding:22px;margin-bottom:18px}.hero h1{font-size:44px}.hero p{margin:12px 0;color:#98a0b5}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:22px}.card{padding:0;overflow:hidden}.thumb{width:100%;height:170px;object-fit:cover;background:#181d2a}.fallback{height:170px;display:flex;align-items:center;justify-content:center;font-size:50px;background:#161925;color:#9e7bff}.body{padding:14px}.body p{color:#98a0b5;font-size:13px;margin-top:6px}.price{margin-top:12px;font-weight:700}.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;width:calc(100% - 32px);max-width:430px;background:#11141d;border:1px solid #232738;border-radius:24px;padding:14px;display:flex;justify-content:space-around;z-index:99}.nav button{background:none;border:none;color:#98a0b5}.nav .on{color:#9e7bff}.chips{display:flex;gap:10px;overflow:auto;margin:18px 0}.chip{padding:10px 14px;border-radius:999px;background:#161b28;border:1px solid #2a3045;white-space:nowrap}.chip.on{background:#8b5cf6}.search,.input,textarea,select{width:100%;padding:14px;border-radius:16px;background:#11141d;border:1px solid #232738;color:#fff}.btn{width:100%;padding:15px;border:none;border-radius:16px;background:#8b5cf6;color:#fff;font-weight:700;margin-top:12px}.profile{display:flex;gap:16px;align-items:center}.avatar{width:76px;height:76px;border-radius:50%;background:#151925;display:flex;align-items:center;justify-content:center}.avatar svg,.icon svg{width:26px;height:26px;stroke:#9e7bff;fill:none;stroke-width:1.8}.bar{height:8px;background:#1f2435;border-radius:999px;margin-top:10px;overflow:hidden}.fill{height:100%;background:#9e7bff}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}.quick-item{text-align:center;font-size:12px}.icon{width:56px;height:56px;background:#151925;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}.menu-item{display:flex;justify-content:space-between;padding:18px 0;border-bottom:1px solid #1d2231}.menu-item:last-child{border:none}.back{margin-bottom:16px;color:#9e7bff}.hidden{display:none}</style></head><body><section id='home' class='page'><div class='hero'><h1>Mystery Store</h1><p>현실적인데 이상하게 기억에 남는 물건들</p></div><div class='chips' id='chips'></div><input class='search' id='search' placeholder='상품 검색'><div class='grid' id='products'></div></section><section id='detail' class='page'><div class='back' onclick='go("home")'>← 돌아가기</div><div class='box'><img id='dimg' class='thumb hidden' style='height:280px'><div id='df' class='fallback'>✦</div><h1 id='dt' style='margin:18px 0 8px'></h1><div id='dp'></div><p id='dd' style='margin-top:16px;color:#98a0b5;line-height:1.7'></p><button class='btn' id='buy'>구매하기</button><button class='btn hidden' id='editBtn'>상품 수정</button></div></section><section id='mypage' class='page'><div class='box'><div class='profile'><div class='avatar'><svg viewBox='0 0 24 24'><circle cx='12' cy='12' r='8'/><path d='M12 4v16'/></svg></div><div style='flex:1'><h2>Explorer</h2><div id='lv' style='margin-top:6px;color:#98a0b5'></div><div class='bar'><div id='fill' class='fill'></div></div><div id='xp' style='margin-top:8px;color:#98a0b5;font-size:13px'></div></div></div></div><div class='box'><div class='quick'><div class='quick-item' onclick='sub("주문 내역")'><div class='icon'><svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/></svg></div>주문</div><div class='quick-item' onclick='openRecent()'><div class='icon'><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v5l3 2"/></svg></div>최근본</div><div class='quick-item' onclick='sub("찜한 상품")'><div class='icon'><svg viewBox="0 0 24 24"><path d="m12 21-7-7a4 4 0 0 1 6-6l1 1 1-1a4 4 0 0 1 6 6z"/></svg></div>찜</div><div class='quick-item' onclick='sub("쿠폰함")'><div class='icon'><svg viewBox="0 0 24 24"><path d="M4 8h16v8H4z"/></svg></div>쿠폰</div></div></div><div class='menu'><div class='menu-item' onclick='openNotice()'><span>공지사항</span><span>›</span></div><div class='menu-item' onclick='support()'><span>고객센터</span><span>›</span></div><div class='menu-item' onclick='sub("배송지 관리")'><span>배송지 관리</span><span>›</span></div><div class='menu-item' onclick='settings()'><span>설정</span><span>›</span></div><div class='menu-item' onclick='logout()'><span>로그아웃</span><span>›</span></div></div><button class='btn' id='toggle'>편집 모드</button><div id='editor' class='hidden'><input class='input' id='name' placeholder='상품 이름'><select id='cat'><option>오브제</option><option>전자기기</option><option>문서</option></select><input class='input' id='price' placeholder='가격 숫자만'><textarea id='desc' placeholder='상세 설명'></textarea><input class='input' id='thumb' type='file'><input class='input' id='detailimg' type='file'><textarea id='notice' placeholder='공지사항 작성'></textarea><button class='btn' onclick='saveProduct()'>저장</button></div></section><section id='sub' class='page'><div class='back' onclick='go("mypage")'>← 마이페이지</div><div class='sub'><h1 id='st'></h1><div id='sd' style='color:#98a0b5;line-height:1.7'></div></div></section><div class='nav'><button data-page='home'>홈</button><button data-page='mypage'>마이</button></div><script>const defaults=[{id:1,name:'다차원 큐브',category:'오브제',price:59000,description:'빛을 비추면 내부 구조가 바뀐다.'}];let products=JSON.parse(localStorage.products||'null')||defaults;let recent=JSON.parse(localStorage.recent||'[]');let notices=JSON.parse(localStorage.notice||'[]');let editor=localStorage.editor==='true';let xp=+localStorage.xp||0;let level=Math.floor(xp/100)+1;let current=localStorage.page||'home';let currentCat='전체';const cats=['전체','오브제','전자기기','문서'];function persist(){localStorage.products=JSON.stringify(products);localStorage.recent=JSON.stringify(recent);localStorage.notice=JSON.stringify(notices);localStorage.editor=editor;localStorage.xp=xp;localStorage.page=current}function go(id){current=id;persist();document.querySelectorAll('.page').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(v=>v.classList.remove('on'));document.querySelector(`[data-page="${id}"]`)?.classList.add('on')}document.querySelectorAll('.nav button').forEach(v=>v.onclick=()=>go(v.dataset.page));function render(){productsWrap.innerHTML='';let arr=[...products];let q=search.value.toLowerCase();if(currentCat!=='전체')arr=arr.filter(v=>v.category===currentCat);if(q)arr=arr.filter(v=>v.name.toLowerCase().includes(q));arr.forEach(p=>{let c=document.createElement('div');c.className='card';c.onclick=()=>detail(p.id);c.innerHTML=`${p.thumb?`<img class='thumb' src='${p.thumb}'>`:`<div class='fallback'>✦</div>`}<div class='body'><h3>${p.name}</h3><p>${p.description.slice(0,35)}...</p><div class='price'>₩${Number(p.price).toLocaleString()}</div></div>`;productsWrap.appendChild(c)});lv.innerText='호기심 Lv.'+level;xp.innerText=xp+' / '+(level*100);fill.style.width=(xp%(level*100))/(level*100)*100+'%';editor?editorDiv.classList.remove('hidden'):editorDiv.classList.add('hidden');persist()}const productsWrap=document.getElementById('products');const editorDiv=document.getElementById('editor');cats.forEach(c=>{let e=document.createElement('div');e.className='chip'+(c==='전체'?' on':'');e.innerText=c;e.onclick=()=>{currentCat=c;document.querySelectorAll('.chip').forEach(v=>v.classList.remove('on'));e.classList.add('on');render()};chips.appendChild(e)});search.oninput=render;function detail(id){let p=products.find(v=>v.id===id);recent=[p,...recent.filter(v=>v.id!==id)].slice(0,10);dt.innerText=p.name;dp.innerText='₩'+Number(p.price).toLocaleString();dd.innerText=p.description;if(p.detail){dimg.src=p.detail;dimg.classList.remove('hidden');df.classList.add('hidden')}else{dimg.classList.add('hidden');df.classList.remove('hidden')}buy.onclick=()=>{xp+=Math.floor(p.price/1000);level=Math.floor(xp/100)+1;alert('구매 완료! 경험치 +'+Math.floor(p.price/1000));render()};editBtn.onclick=()=>{go('mypage');name.value=p.name;price.value=p.price;desc.value=p.description};editBtn.classList.toggle('hidden',!editor);go('detail')}function saveProduct(){let fr=new FileReader();let file=thumb.files[0];if(file){fr.onload=e=>add(e.target.result);fr.readAsDataURL(file)}else add('');function add(img){products.unshift({id:Date.now(),name:name.value,category:cat.value,price:+price.value,description:desc.value,thumb:img});if(notice.value)notices.unshift(notice.value);name.value='';price.value='';desc.value='';notice.value='';render();go('home')}}toggle.onclick=()=>{editor=!editor;render()};function sub(t,d=''){st.innerText=t;sd.innerHTML=d||t+' 페이지';go('sub')}function openNotice(){sub('공지사항',notices.length?notices.map(v=>'<div style="margin-bottom:14px">• '+v+'</div>').join(''):'공지 없음')}function support(){sub('고객센터','<b>자주 묻는 질문</b><br><br>Q. 배송은 얼마나 걸리나요?<br>A. 평균 2~3일 소요됩니다.<br><br><b>1대1 문의하기</b><br>mystery@store.com')}function settings(){sub('설정','다크모드 유지<br><br>알림 설정<br><br>앱 사운드')}function logout(){localStorage.removeItem('page');localStorage.removeItem('editor');go('home');alert('로그아웃됨')}function openRecent(){sub('최근 본 상품',recent.length?recent.map(v=>'<div style="margin-bottom:12px">'+v.name+'</div>').join(''):'최근 본 상품 없음')}go(current);render()</script></body></html>
