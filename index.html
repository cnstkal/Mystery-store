<!doctype html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0,viewport-fit=cover'><title>Mystery Store</title><link rel='preconnect' href='https://fonts.googleapis.com'><link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap' rel='stylesheet'><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:Inter,sans-serif;background:#05060a;color:#fff;padding:18px;padding-bottom:140px}.app{max-width:430px;margin:auto}.page{display:none}.page.active{display:block}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.title{font-size:34px;font-weight:700}.hero{background:linear-gradient(180deg,#11131c,#090b11);border:1px solid #202436;border-radius:32px;padding:28px;margin-bottom:24px}.tag{display:inline-block;padding:8px 14px;border-radius:999px;background:#171b28;border:1px solid #2d3348;color:#b5afd7;font-size:12px;margin-bottom:16px}.hero h2{font-size:42px;line-height:1.05;margin-bottom:14px}.hero p{color:#9aa1b6;line-height:1.6;margin-bottom:20px}.hero button,.btn{width:100%;padding:16px;border:none;border-radius:18px;background:linear-gradient(90deg,#8b5cf6,#6d4cff);color:#fff;font-weight:700}.section{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.section span{color:#8b90a6}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:#0e1118;border:1px solid #202436;border-radius:24px;overflow:hidden}.image{height:170px;background:linear-gradient(180deg,#171b28,#0d1017);display:flex;align-items:center;justify-content:center;font-size:52px;color:#9e7bff}.body{padding:16px}.body h3{font-size:18px;margin-bottom:8px}.body p{font-size:13px;color:#9aa1b6;line-height:1.5}.price{margin-top:16px;font-weight:700}.panel{background:#0e1118;border:1px solid #202436;border-radius:24px;padding:20px;margin-bottom:16px}.panel h3{margin-bottom:8px}.panel p{color:#9aa1b6;line-height:1.5}.editor{margin-top:18px}.editor input,.editor textarea{width:100%;margin-top:10px;padding:14px;border-radius:14px;background:#080a11;border:1px solid #272c3d;color:#fff}.editor textarea{height:90px;resize:none}.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;width:calc(100% - 32px);max-width:430px;background:rgba(10,11,18,.96);border:1px solid #232738;border-radius:30px;padding:16px 8px calc(16px + env(safe-area-inset-bottom));display:flex;justify-content:space-around;backdrop-filter:blur(20px);z-index:9999}.nav{display:flex;flex-direction:column;align-items:center;gap:7px;color:#8b90a6;font-size:12px;cursor:pointer;min-width:58px}.nav.active{color:#9e7bff}.nav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}.search{width:100%;padding:16px;border-radius:18px;background:#0e1118;border:1px solid #202436;color:#fff;margin-bottom:18px}@media(max-width:480px){.grid{grid-template-columns:1fr}}</style></head><body><div class='app'><section class='page active' id='home'><div class='top'><div class='title'>Mystery Store</div><div style='color:#9e7bff;font-size:26px'>◌</div></div><div class='hero'><div class='tag'>익숙한 일상 속 낯선 무언가</div><h2>설명되지 않는<br>물건들</h2><p>현실적인데 이상하게 기억에 남는 물건들을 판매합니다.</p><button>탐험하러 가기</button></div><div class='section'><h2>New Arrivals</h2><span>전체보기</span></div><div class='grid' id='products'></div></section><section class='page' id='category'><div class='top'><div class='title'>카테고리</div></div><div class='panel'><h3>오브제</h3><p>설명하기 어려운 물건들</p></div><div class='panel'><h3>전자기기</h3><p>기묘하게 동작하는 장치들</p></div><div class='panel'><h3>문서</h3><p>출처를 알 수 없는 기록물</p></div></section><section class='page' id='search'><div class='top'><div class='title'>검색</div></div><input class='search' placeholder='이상한 물건 검색'><div class='panel'><h3>최근 검색</h3><p>다차원 큐브</p></div></section><section class='page' id='wishlist'><div class='top'><div class='title'>찜 목록</div></div><div class='panel'><h3>아직 찜한 상품이 없습니다.</h3></div></section><section class='page' id='mypage'><div class='top'><div class='title'>마이페이지</div></div><div class='panel'><h3>Explorer Lv.3</h3><p>설명되지 않는 물건 12개 조회</p></div><button class='btn' id='toggle'>편집자 모드</button><div class='editor' id='editor' style='display:none'><input id='name' placeholder='상품 이름'><input id='price' placeholder='가격'><textarea id='desc' placeholder='설명'></textarea><button class='btn' id='add' style='margin-top:12px'>상품 추가</button></div></section></div><nav class='bottom'><div class='nav active' data-page='home'><svg viewBox='0 0 24 24'><path d='M3 10.5 12 3l9 7.5'/><path d='M5 9.5V21h14V9.5'/></svg><span>홈</span></div><div class='nav' data-page='category'><svg viewBox='0 0 24 24'><rect x='3' y='3' width='7' height='7' rx='1'/><rect x='14' y='3' width='7' height='7' rx='1'/><rect x='14' y='14' width='7' height='7' rx='1'/><rect x='3' y='14' width='7' height='7' rx='1'/></svg><span>카테고리</span></div><div class='nav' data-page='search'><svg viewBox='0 0 24 24'><circle cx='11' cy='11' r='7'/><path d='m20 20-3.5-3.5'/></svg><span>검색</span></div><div class='nav' data-page='wishlist'><svg viewBox='0 0 24 24'><path d='m12 21-1.8-1.6C5 14.7 2 12 2 8.5 2 5.4 4.4 3 7.5 3c1.7 0 3.4.8 4.5 2.1C13.1 3.8 14.8 3 16.5 3 19.6 3 22 5.4 22 8.5c0 3.5-3 6.2-8.2 10.9z'/></svg><span>찜</span></div><div class='nav' data-page='mypage'><svg viewBox='0 0 24 24'><circle cx='12' cy='8' r='4'/><path d='M4 21c1.8-3.5 5-5 8-5s6.2 1.5 8 5'/></svg><span>마이</span></div></nav><script>const defaults=[{id:1,emoji:'◈',name:'다차원 큐브',price:'₩59,000',description:'빛을 비추면 내부 구조가 바뀐다.'},{id:2,emoji:'◌',name:'기억 저장 장치',price:'₩89,000',description:'누군가의 오래된 기억이 남아있다.'},{id:3,emoji:'⌛',name:'시간의 파편',price:'₩67,000',description:'초침 소리가 거꾸로 들린다.'}];let products=JSON.parse(localStorage.getItem('mystery-products')||'null')||defaults;products=products.map(v=>({emoji:'✦',description:'설명되지 않는 상품',...v}));let editorMode=localStorage.getItem('mystery-editor')==='true';const wrap=document.getElementById('products');const editor=document.getElementById('editor');function save(){localStorage.setItem('mystery-products',JSON.stringify(products));localStorage.setItem('mystery-editor',editorMode)}function render(){wrap.innerHTML='';editor.style.display=editorMode?'block':'none';products.forEach(item=>{const el=document.createElement('div');el.className='card';el.innerHTML=`<div class='image'>${item.emoji}</div><div class='body'><h3>${item.name}</h3><p>${item.description}</p><div class='price'>${item.price}</div></div>`;wrap.appendChild(el)});save()}document.querySelectorAll('.nav').forEach(btn=>{btn.onclick=()=>{document.querySelectorAll('.nav').forEach(v=>v.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.page').forEach(v=>v.classList.remove('active'));document.getElementById(btn.dataset.page).classList.add('active')}});document.getElementById('toggle').onclick=()=>{editorMode=!editorMode;render()};document.getElementById('add').onclick=()=>{const name=document.getElementById('name').value.trim();if(!name)return;products.unshift({id:Date.now(),emoji:'✦',name,price:document.getElementById('price').value||'가격 미정',description:document.getElementById('desc').value||'설명되지 않는 상품'});document.getElementById('name').value='';document.getElementById('price').value='';document.getElementById('desc').value='';render()};render()</script></body></html>
