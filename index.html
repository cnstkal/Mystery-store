<!doctype html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Mystery Store</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#05060a;color:#fff;padding:18px;padding-bottom:120px}.page{display:none}.active{display:block}.hero,.panel,.detail,.profile,.menu,.sub{background:#10131c;border:1px solid #22283a;border-radius:28px;padding:22px;margin-bottom:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}.card{background:#0e1118;border:1px solid #202436;border-radius:24px;overflow:hidden}.thumb{width:100%;height:170px;object-fit:cover;background:#181d2a}.fallback{height:170px;display:flex;align-items:center;justify-content:center;font-size:52px;background:#151925;color:#8b5cf6}.body{padding:14px}.body h3{font-size:17px;margin-bottom:6px}.body p{font-size:13px;color:#9aa1b6;min-height:38px}.price{margin-top:12px;font-weight:700}.btn,input,textarea,select{width:100%;padding:14px;border-radius:14px;border:none;margin-top:10px}.btn{background:#8b5cf6;color:#fff;font-weight:700}.nav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:430px;background:#11141d;border:1px solid #232738;border-radius:26px;padding:14px;display:flex;justify-content:space-around;z-index:999}.nav button{background:none;border:none;color:#9aa1b6}.nav .on{color:#9e7bff}.chips{display:flex;gap:10px;overflow:auto;margin-bottom:16px}.chip{padding:10px 14px;border-radius:999px;background:#161b28;border:1px solid #2a3045;white-space:nowrap}.chip.on{background:#8b5cf6}.search{background:#10131c;color:#fff;border:1px solid #232738;margin-top:8px}.hidden{display:none}.profile{display:flex;gap:16px;align-items:center}.avatar{width:82px;height:82px;border-radius:50%;background:linear-gradient(180deg,#0d0f16,#1a1f30);display:flex;align-items:center;justify-content:center}.avatar svg,.icon svg{width:28px;height:28px;stroke:#9e7bff;fill:none;stroke-width:1.8}.bar{width:100%;height:8px;background:#1f2435;border-radius:999px;margin-top:10px;overflow:hidden}.fill{width:53%;height:100%;background:#9e7bff}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px}.quick-item{text-align:center;font-size:12px;color:#cfd3df;cursor:pointer}.icon{display:flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:18px;background:#151925;margin:0 auto 10px}.menu-item{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid #1d2231;color:#d5d9e5;cursor:pointer}.menu-item:last-child{border:none}.sub h1{font-size:30px;margin-bottom:12px}.sub p{color:#9aa1b6;line-height:1.6}.back{margin-bottom:16px;color:#9e7bff;cursor:pointer}</style></head><body><section id='home' class='page active'><div class='hero'><h1 style='font-size:42px'>Mystery Store</h1><p style='margin:14px 0;color:#9aa1b6'>현실적인데 이상하게 기억에 남는 물건들</p><button class='btn'>탐험하기</button></div><div class='chips' id='chips'></div><input class='search' id='searchInput' placeholder='상품 검색'><div class='grid' id='products'></div></section><section id='detail' class='page'><div onclick='goHome()' class='back'>← 돌아가기</div><div class='detail'><img id='detailImg' class='thumb hidden' style='height:280px'><div id='detailFallback' class='fallback'>✦</div><h1 id='detailTitle' style='margin:20px 0 10px'></h1><div id='detailPrice' style='font-size:22px;font-weight:700;margin-bottom:18px'></div><div id='detailText' style='line-height:1.7;color:#a2a9bc'></div></div></section><section id='mypage' class='page'><div class='profile'><div class='avatar'><svg viewBox='0 0 24 24'><path d='M12 3v18'/><circle cx='12' cy='12' r='8'/></svg></div><div style='flex:1'><h2>Explorer</h2><div style='margin-top:6px;color:#9aa1b6'>호기심 Lv.3</div><div class='bar'><div class='fill'></div></div><div style='margin-top:8px;color:#8d94ab;font-size:13px'>320 / 600</div></div></div><div class='panel'><div class='quick'><div class='quick-item' onclick="openSub('주문 내역')"><div class='icon'><svg viewBox='0 0 24 24'><rect x='5' y='5' width='14' height='14' rx='2'/><path d='M9 9h6M9 13h6'/></svg></div>주문 내역</div><div class='quick-item' onclick="openSub('찜한 상품')"><div class='icon'><svg viewBox='0 0 24 24'><path d='m12 21-7-7a4 4 0 0 1 6-6l1 1 1-1a4 4 0 0 1 6 6z'/></svg></div>찜한 상품</div><div class='quick-item' onclick="openSub('최근 본 상품')"><div class='icon'><svg viewBox='0 0 24 24'><circle cx='12' cy='12' r='8'/><path d='M12 8v5l3 2'/></svg></div>최근 본 상품</div><div class='quick-item' onclick="openSub('쿠폰함')"><div class='icon'><svg viewBox='0 0 24 24'><path d='M4 8h16v8H4z'/><path d='M9 8v8'/></svg></div>쿠폰함</div></div></div><div class='menu'><div class='menu-item' onclick="openSub('공지사항')"><span>공지사항</span><span>›</span></div><div class='menu-item' onclick="openSub('고객센터')"><span>고객센터</span><span>›</span></div><div class='menu-item' onclick="openSub('배송지 관리')"><span>배송지 관리</span><span>›</span></div><div class='menu-item' onclick="openSub('결제 수단 관리')"><span>결제 수단 관리</span><span>›</span></div><div class='menu-item' onclick="openSub('설정')"><span>설정</span><span>›</span></div><div class='menu-item' onclick="openSub('로그아웃')"><span>로그아웃</span><span>›</span></div></div></section><section id='sub' class='page'><div class='back' onclick="page('mypage')">← 마이페이지</div><div class='sub'><h1 id='subTitle'></h1><p id='subDesc'></p></div></section><div class='nav'><button class='on' data-page='home'>홈</button><button data-page='mypage'>마이</button></div><script>const defaults=[{id:1,name:'다차원 큐브',category:'오브제',price:'₩59,000',description:'빛을 비추면 내부 구조가 바뀐다.',thumb:'',detail:''}];let products=JSON.parse(localStorage.getItem('mystery-products')||'null')||defaults;let currentCategory='전체';const categories=['전체','오브제','전자기기','문서','기록물'];function page(id){document.querySelectorAll('.page').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(v=>v.classList.remove('on'));const btn=document.querySelector(`[data-page="${id}"]`);if(btn)btn.classList.add('on')}function openSub(title){page('sub');subTitle.innerText=title;subDesc.innerText=title+' 페이지입니다.'}function goHome(){page('home')}window.goHome=goHome;document.querySelectorAll('.nav button').forEach(v=>v.onclick=()=>page(v.dataset.page));const chips=document.getElementById('chips');categories.forEach(c=>{const el=document.createElement('div');el.className='chip'+(c==='전체'?' on':'');el.innerText=c;el.onclick=()=>{currentCategory=c;document.querySelectorAll('.chip').forEach(v=>v.classList.remove('on'));el.classList.add('on');render()};chips.appendChild(el)});function render(){const wrap=document.getElementById('products');wrap.innerHTML='';let filtered=[...products];const q=document.getElementById('searchInput').value?.toLowerCase()||'';if(currentCategory!=='전체')filtered=filtered.filter(v=>v.category===currentCategory);if(q)filtered=filtered.filter(v=>v.name.toLowerCase().includes(q)||v.description.toLowerCase().includes(q));filtered.forEach(item=>{const card=document.createElement('div');card.className='card';card.onclick=()=>openDetail(item.id);card.innerHTML=`${item.thumb?`<img class='thumb' src='${item.thumb}'>`:`<div class='fallback'>✦</div>`}<div class='body'><h3>${item.name}</h3><p>${item.description.slice(0,45)}...</p><div class='price'>${item.price}</div></div>`;wrap.appendChild(card)})}document.getElementById('searchInput').oninput=render;function openDetail(id){const item=products.find(v=>v.id===id);page('detail');detailTitle.innerText=item.name;detailPrice.innerText=item.price;detailText.innerText=item.description;if(item.detail){detailImg.src=item.detail;detailImg.classList.remove('hidden');detailFallback.classList.add('hidden')}else{detailImg.classList.add('hidden');detailFallback.classList.remove('hidden')}}render()</script></body></html>
