<!doctype html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Mystery Store</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:#05060a;color:#fff;padding:18px;padding-bottom:120px}.page{display:none}.active{display:block}.hero,.panel,.detail{background:#10131c;border:1px solid #22283a;border-radius:28px;padding:22px;margin-bottom:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:#0e1118;border:1px solid #202436;border-radius:22px;overflow:hidden}.thumb{width:100%;height:170px;object-fit:cover;background:#181d2a}.fallback{height:170px;display:flex;align-items:center;justify-content:center;font-size:52px;background:#151925;color:#8b5cf6}.body{padding:14px}.body h3{font-size:17px;margin-bottom:6px}.body p{font-size:13px;color:#9aa1b6;min-height:38px}.price{margin-top:12px;font-weight:700}.btn,input,textarea,select{width:100%;padding:14px;border-radius:14px;border:none;margin-top:10px}.btn{background:#8b5cf6;color:#fff;font-weight:700}.nav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:430px;background:#11141d;border:1px solid #232738;border-radius:26px;padding:14px;display:flex;justify-content:space-around}.nav button{background:none;border:none;color:#9aa1b6}.nav .on{color:#9e7bff}.chips{display:flex;gap:10px;overflow:auto;margin-bottom:16px}.chip{padding:10px 14px;border-radius:999px;background:#161b28;border:1px solid #2a3045;white-space:nowrap}.chip.on{background:#8b5cf6}.search{background:#10131c;color:#fff;border:1px solid #232738}.hidden{display:none}</style></head><body><section id='home' class='page active'><div class='hero'><h1 style='font-size:42px'>Mystery Store</h1><p style='margin:14px 0;color:#9aa1b6'>현실적인데 이상하게 기억에 남는 물건들</p><button class='btn'>탐험하기</button></div><div class='chips' id='chips'></div><input class='search' id='searchInput' placeholder='상품 검색'><div class='grid' id='products'></div></section><section id='detail' class='page'><div onclick='goHome()' style='margin-bottom:18px;color:#9e7bff'>← 돌아가기</div><div class='detail'><img id='detailImg' class='thumb hidden' style='height:280px'><div id='detailFallback' class='fallback'>✦</div><h1 id='detailTitle' style='margin:20px 0 10px'></h1><div id='detailPrice' style='font-size:22px;font-weight:700;margin-bottom:18px'></div><div id='detailText' style='line-height:1.7;color:#a2a9bc'></div><button id='editBtn' class='btn hidden' style='margin-top:18px'>상품 수정</button><button id='deleteBtn' class='btn hidden' style='background:#ff4d6d;margin-top:10px'>상품 삭제</button></div></section><section id='mypage' class='page'><div class='panel'><h2>마이페이지</h2><p style='margin-top:10px;color:#9aa1b6'>편집자 모드에서 상품을 관리할 수 있습니다.</p></div><button class='btn' id='toggle'>편집자 모드</button><div id='editor' class='hidden'><input id='name' placeholder='상품 이름'><select id='category'><option>오브제</option><option>전자기기</option><option>문서</option><option>기록물</option></select><input id='price' placeholder='가격'><textarea id='desc' placeholder='상세 설명'></textarea><input id='thumbInput' type='file' accept='image/*'><input id='detailInput' type='file' accept='image/*'><button class='btn' id='saveBtn'>상품 저장</button></div></section><div class='nav'><button class='on' data-page='home'>홈</button><button data-page='mypage'>마이</button></div><script>const defaults=[{id:1,name:'다차원 큐브',category:'오브제',price:'₩59,000',description:'빛을 비추면 내부 구조가 바뀐다.',thumb:'',detail:''},{id:2,name:'시간의 파편',category:'기록물',price:'₩67,000',description:'초침 소리가 거꾸로 들린다.',thumb:'',detail:''}];let products=JSON.parse(localStorage.getItem('mystery-products')||'null')||defaults;let editorMode=localStorage.getItem('editorMode')==='true';let currentCategory='전체';let editingId=null;const categories=['전체','오브제','전자기기','문서','기록물'];function save(){localStorage.setItem('mystery-products',JSON.stringify(products));localStorage.setItem('editorMode',editorMode)}function page(id){document.querySelectorAll('.page').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(v=>v.classList.remove('on'));const btn=document.querySelector(`[data-page="${id}"]`);if(btn)btn.classList.add('on')}function goHome(){page('home')}window.goHome=goHome;document.querySelectorAll('.nav button').forEach(v=>v.onclick=()=>page(v.dataset.page));const chips=document.getElementById('chips');categories.forEach(c=>{const el=document.createElement('div');el.className='chip'+(c==='전체'?' on':'');el.innerText=c;el.onclick=()=>{currentCategory=c;document.querySelectorAll('.chip').forEach(v=>v.classList.remove('on'));el.classList.add('on');render()};chips.appendChild(el)});function render(){const wrap=document.getElementById('products');wrap.innerHTML='';let filtered=[...products];const q=document.getElementById('searchInput').value?.toLowerCase()||'';if(currentCategory!=='전체')filtered=filtered.filter(v=>v.category===currentCategory);if(q)filtered=filtered.filter(v=>v.name.toLowerCase().includes(q)||v.description.toLowerCase().includes(q));filtered.forEach(item=>{const card=document.createElement('div');card.className='card';card.onclick=()=>openDetail(item.id);card.innerHTML=`${item.thumb?`<img class='thumb' src='${item.thumb}'>`:`<div class='fallback'>✦</div>`}<div class='body'><h3>${item.name}</h3><p>${item.description.slice(0,45)}...</p><div class='price'>${item.price}</div></div>`;wrap.appendChild(card)});document.getElementById('editor').className=editorMode?'':'hidden';save()}document.getElementById('searchInput').oninput=render;function openDetail(id){const item=products.find(v=>v.id===id);page('detail');document.getElementById('detailTitle').innerText=item.name;document.getElementById('detailPrice').innerText=item.price;document.getElementById('detailText').innerText=item.description;const img=document.getElementById('detailImg');const fb=document.getElementById('detailFallback');if(item.detail){img.src=item.detail;img.classList.remove('hidden');fb.classList.add('hidden')}else{img.classList.add('hidden');fb.classList.remove('hidden')}const edit=document.getElementById('editBtn');const del=document.getElementById('deleteBtn');if(editorMode){edit.classList.remove('hidden');del.classList.remove('hidden');edit.onclick=()=>editProduct(id);del.onclick=()=>{products=products.filter(v=>v.id!==id);save();goHome();render()}}else{edit.classList.add('hidden');del.classList.add('hidden')}}function editProduct(id){const item=products.find(v=>v.id===id);editingId=id;page('mypage');document.getElementById('name').value=item.name;document.getElementById('category').value=item.category;document.getElementById('price').value=item.price;document.getElementById('desc').value=item.description}document.getElementById('toggle').onclick=()=>{editorMode=!editorMode;render()};function b64(file){return new Promise(r=>{if(!file)return r('');const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(file)})}document.getElementById('saveBtn').onclick=async()=>{const thumb=await b64(document.getElementById('thumbInput').files[0]);const detail=await b64(document.getElementById('detailInput').files[0]);const data={id:editingId||Date.now(),name:name.value,category:category.value,price:price.value||'가격 미정',description:desc.value||'설명 없음',thumb:thumb||products.find(v=>v.id===editingId)?.thumb||'',detail:detail||products.find(v=>v.id===editingId)?.detail||''};if(editingId){products=products.map(v=>v.id===editingId?data:v)}else{products.unshift(data)}editingId=null;name.value='';price.value='';desc.value='';thumbInput.value='';detailInput.value='';render();goHome()};render()</script></body></html>
